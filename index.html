<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rootme 漏洞页面</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #111;
    }
    .content {
      text-align: center;
      max-width: 560px;
      width: 100%;
    }
    a.button {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 20px;
      background: #1a73e8;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Rootme 漏洞入口</h1>
    <p>一切漏洞只能用于学习和研究，不能用于任何非法活动。</p>
    <a class="button" href="/CVE-2026-23274/">安卓Firefox网页提权root漏洞 (CVE-2026-23274)</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.js"></script>
  <script>
    NProgress.configure({ showSpinner: false });
    NProgress.start();
    document.addEventListener('DOMContentLoaded', () => {
      NProgress.set(0.4);
    });
    window.addEventListener('load', () => {
      NProgress.done();
    });
  </script>
</body>
</html>
